<!doctype html>
<html class="h-full bg-linear-65 from-slate-50 to-slate-100" lang="en">

<head>
<meta charset="UTF-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet">
<link href="src/output.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
<script crossorigin="anonymous" src="https://kit.fontawesome.com/807acfa91f.js"></script>
</head>

<body class="h-full">
<div class="flex min-h-full flex-col justify-center py-12 px-2 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <img src="https://cdn.prod.website-files.com/664cfafd1b780dd90b9bc416/68a7b899eb604ec798b4d0e1_fa_horizontal_text_purple_orange.png" alt="Your Company" class="mx-auto h-10 w-auto" />
    </div>



    <div class="mt-10 mt-10 sm:mx-auto sm:w-full sm:max-w-[480px]">
        <div class="bg-white px-8 pt-8 pb-10 shadow-sm sm:rounded-lg">
            <h2 class="text-2xl font-semibold text-slate-900 mb-6">Login</h2>
            <form action="#" method="POST">
                <div class="pb-4">
                    <label for="email" class="mb-1 block text-sm/6 font-medium text-slate-900">Email*</label>
                    <div>
                        <div>
                            <input class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-slate-900 outline-1 -outline-offset-1 outline-slate-300 placeholder:text-slate-400 placeholder:text-sm focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" id="email" name="email" placeholder="" type="email">
                        </div>

                    </div>
                </div>

                <div class="pb-6">
                    <label for="password" class=" mb-1 block text-sm/6 font-medium text-slate-900">Password</label>
                    <div>
                        <div>
                            <input class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-slate-900 outline-1 -outline-offset-1 outline-slate-300 placeholder:text-slate-400 placeholder:text-sm focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" id="password" name="password" placeholder="" type="email">
                        </div>

                    </div>
                </div>

                <div class="flex items-center justify-between pb-6">

                    <div class="flex gap-3">
                        <div class="flex h-6 shrink-0 items-center">
                            <div class="group grid size-4 grid-cols-1">
                                <input id="remember-me" type="checkbox" name="remember-me" class="col-start-1 row-start-1 appearance-none rounded-sm border border-slate-300 bg-white checked:border-indigo-600 checked:bg-indigo-600 indeterminate:border-indigo-600 indeterminate:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:border-slate-300 disabled:bg-slate-100 disabled:checked:bg-slate-100 forced-colors:appearance-auto" />
                                <svg viewBox="0 0 14 14" fill="none" class="pointer-events-none col-start-1 row-start-1 size-3.5 self-center justify-self-center stroke-white group-has-disabled:stroke-slate-950/25">
                                    <path d="M3 8L6 11L11 3.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 group-has-checked:opacity-100" />
                                    <path d="M3 7H11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 group-has-indeterminate:opacity-100" />
                                </svg>
                            </div>
                        </div>
                        <label for="remember-me" class="block text-sm text-slate-900">Remember me</label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-semibold  text-indigo-500 hover:text-indigo-700">Forgot password?</a>
                    </div>
                </div>

                <div>

                    <button type="submit" class="flex w-full justify-center rounded-md bg-indigo-500 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500" type="button">
                        Sign in
                    </button>
                </div>

            </form>
        </div>
        <p class="mt-10 text-center text-sm/6 text-slate-500">
            Don't have an account?
            <a href="#" class="font-semibold text-indigo-500 hover:text-indigo-700">Click here</a>
        </p>

    </div>
</div>

</body>
</html>
